<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Download StudyDuck from the App Store or Google Play." />
  <title>Get StudyDuck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body class="store-page">
  <main class="store-card" aria-labelledby="store-title">
    <img src="../duck-logo.png" alt="" />
    <p class="eyebrow">Get the app</p>
    <h1 id="store-title">StudyDuck</h1>
    <p id="store-status">We are opening the right store for your device.</p>

    <div class="store-links" aria-label="Download links">
      <a class="store-link" href="https://play.google.com/store/apps/details?id=com.halukayt.StudyBuddy&amp;pli=1">
        <span>Google Play</span>
        <span aria-hidden="true">Android</span>
      </a>
      <a class="store-link" href="https://apps.apple.com/us/app/studyduck/id6746414094">
        <span>App Store</span>
        <span aria-hidden="true">iOS</span>
      </a>
    </div>

    <a class="back-link" href="../index.html">Back to StudyDuck</a>
  </main>

  <script>
    (function () {
      const playUrl = "https://play.google.com/store/apps/details?id=com.halukayt.StudyBuddy&pli=1";
      const appStoreUrl = "https://apps.apple.com/us/app/studyduck/id6746414094";
      const ua = navigator.userAgent || navigator.vendor || window.opera;

      if (/android/i.test(ua)) {
        window.location.replace(playUrl);
        return;
      }

      if (/iPad|iPhone|iPod/.test(ua)) {
        window.location.replace(appStoreUrl);
        return;
      }

      const status = document.getElementById("store-status");
      if (status) {
        status.textContent = "Choose your store to download StudyDuck.";
      }
    })();
  </script>
</body>
</html>
