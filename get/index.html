
<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>StudyDuck – Yönlendiriliyor…</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding:24px;text-align:center;line-height:1.4}
    a.button{display:inline-block;margin:8px;padding:12px 16px;border-radius:12px;border:1px solid #ddd;text-decoration:none}
  </style>
</head>
<body>
  <h1>StudyDuck</h1>
  <p>Cihazına uygun mağazaya yönlendiriliyor…</p>

  <script>
    const PLAY_URL = "https://play.google.com/store/apps/details?id=com.halukayt.StudyBuddy&pli=1"; // Android linkin
    const APPSTORE_URL = "https://apps.apple.com/us/app/studyduck/id6746414094"; // iOS linkin
    const FALLBACK_URL = "https://study-duck.com";

    const ua = navigator.userAgent || navigator.vendor || window.opera;
    if (/android/i.test(ua)) {
      window.location.replace(PLAY_URL);
    } else if (/iPad|iPhone|iPod/.test(ua)) {
      window.location.replace(APPSTORE_URL);
    } else {
      document.write(`
        <p>Cihazını algılayamadık. Lütfen mağazanı seç:</p>
        <a class="button" href="${PLAY_URL}">Google Play</a>
        <a class="button" href="${APPSTORE_URL}">App Store</a>
      `);
    }
  </script>
</body>
</html>
